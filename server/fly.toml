# fly.toml — Fly.io configuration for the Checkers AI server
# Deploy with: fly deploy (from the server/ directory)

app = "checkers-ai-server"
primary_region = "waw"  # Warsaw — closest to Poland

[build]

[env]
  PORT = "3001"
  DATA_DIR = "/app/data"
  # Set FRONTEND_ORIGIN via: fly secrets set FRONTEND_ORIGIN=https://your-app.vercel.app

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[[mounts]]
  source = "checkers_data"
  destination = "/app/data"
  initial_size = "1gb"
